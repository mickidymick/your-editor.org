<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340">
<defs><style>text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, monospace; font-size: 12px; }</style></defs>
<clipPath id="clip"><rect width="640" height="340" rx="8"/></clipPath>
<g clip-path="url(#clip)">
<rect width="640" height="340" fill="#f6f1d1"/>

<!-- Cursor line highlight on line 1 -->
<rect x="0" y="0" width="640" height="17" fill="#cfd7c7"/>

<!-- Line numbers + code -->
<text x="20" y="13" fill="#888888" opacity="0.5" text-anchor="end">1</text>
<text x="28" y="13" fill="#48b4eb">/* hello.c -- your first yed buffer */</text>

<text x="20" y="30" fill="#888888" opacity="0.5" text-anchor="end">2</text>
<text x="28" y="30" fill="#d81e5b">#include</text><text x="86" y="30" fill="#0b2027"> &lt;stdio.h&gt;</text>

<text x="20" y="47" fill="#888888" opacity="0.5" text-anchor="end">3</text>

<text x="20" y="64" fill="#888888" opacity="0.5" text-anchor="end">4</text>
<text x="28" y="64" fill="#d81e5b">int</text><text x="50" y="64" fill="#0b2027"> </text><text x="57" y="64" fill="#2c6578">main</text><text x="86" y="64" fill="#0b2027">(</text><text x="93" y="64" fill="#d81e5b">void</text><text x="122" y="64" fill="#0b2027">) {</text>

<text x="20" y="81" fill="#888888" opacity="0.5" text-anchor="end">5</text>
<text x="28" y="81" fill="#0b2027">    </text><text x="57" y="81" fill="#2c6578">printf</text><text x="100" y="81" fill="#0b2027">(</text><text x="107" y="81" fill="#3f965b">"hello, world!\n"</text><text x="215" y="81" fill="#0b2027">);</text>

<text x="20" y="98" fill="#888888" opacity="0.5" text-anchor="end">6</text>
<text x="28" y="98" fill="#0b2027">    </text><text x="57" y="98" fill="#d81e5b">return</text><text x="100" y="98" fill="#0b2027"> </text><text x="107" y="98" fill="#895777">0</text><text x="114" y="98" fill="#0b2027">;</text>

<text x="20" y="115" fill="#888888" opacity="0.5" text-anchor="end">7</text>
<text x="28" y="115" fill="#0b2027">}</text>

<text x="20" y="132" fill="#888888" opacity="0.5" text-anchor="end">8</text>
<text x="20" y="149" fill="#888888" opacity="0.5" text-anchor="end">9</text>

<!-- Empty lines with tildes -->
<text x="28" y="166" fill="#888888" opacity="0.4">~</text>
<text x="28" y="183" fill="#888888" opacity="0.4">~</text>
<text x="28" y="200" fill="#888888" opacity="0.4">~</text>
<text x="28" y="217" fill="#888888" opacity="0.4">~</text>
<text x="28" y="234" fill="#888888" opacity="0.4">~</text>
<text x="28" y="251" fill="#888888" opacity="0.4">~</text>
<text x="28" y="268" fill="#888888" opacity="0.4">~</text>
<text x="28" y="285" fill="#888888" opacity="0.4">~</text>
<text x="28" y="302" fill="#888888" opacity="0.4">~</text>

<!-- Gutter line -->
<line x1="24" y1="0" x2="24" y2="316" stroke="#888888" opacity="0.12"/>

<!-- Status bar -->
<rect y="316" width="640" height="24" fill="#40798c"/>
